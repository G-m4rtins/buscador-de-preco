<app-search-form (search)="onSearch($event)"></app-search-form>

<div class="results-section" *ngIf="hasSearched()">
  <div class="results-header">
    <div class="results-title-group">
      <h2 class="h2">Resultados da busca</h2>
      <span class="badge badge-blue">{{ results().length }} resultados encontrados</span>
    </div>
    <button class="btn-filter">
      <i class="ph ph-funnel"></i>
      <span>Filtros</span>
    </button>
  </div>

  <div class="results-list" *ngIf="!isLoading() && results().length > 0">
    <app-result-card 
      *ngFor="let result of results()" 
      [data]="result">
    </app-result-card>
  </div>
  
  <div class="loading-state" *ngIf="isLoading()">
    <i class="ph ph-spinner ph-spin text-primary" style="font-size: 2rem;"></i>
    <p>Buscando os melhores preços...</p>
  </div>

  <div class="empty-state" *ngIf="!isLoading() && results().length === 0">
    <p>Nenhum resultado encontrado para a sua busca.</p>
  </div>

  <div class="results-footer" *ngIf="results().length > 0">
    <button class="btn-outline load-more" (click)="loadMore()" [disabled]="isLoading()">
      {{ isLoading() ? 'Carregando...' : 'Carregar mais resultados' }}
      <i class="ph ph-caret-down"></i>
    </button>
  </div>
</div>

<div class="disclaimer">
  <i class="ph ph-info"></i>
  <span>Os preços e condições podem mudar a qualquer momento. Verifique sempre no site da loja.</span>
</div>
