<aside class="sidebar">
  <div class="sidebar-header">
    <div class="logo">
      <i class="ph-fill ph-magnifying-glass-dollar text-primary"></i>
      <span class="logo-text">BuscaPreço</span>
    </div>
  </div>

  <nav class="sidebar-nav">
    <ul>
      <li class="nav-item">
        <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
          <i class="ph ph-magnifying-glass"></i>
          <span>Nova Busca</span>
        </a>
      </li>
      <li class="nav-item">
        <a routerLink="/history" routerLinkActive="active">
          <i class="ph ph-clock-counter-clockwise"></i>
          <span>Histórico</span>
        </a>
      </li>
      <li class="nav-item">
        <a routerLink="/favorites" routerLinkActive="active">
          <i class="ph ph-heart"></i>
          <span>Favoritos</span>
        </a>
      </li>
      <li class="nav-item">
        <a routerLink="/alerts" routerLinkActive="active">
          <i class="ph ph-bell-ringing"></i>
          <span>Alertas de Preço</span>
        </a>
      </li>
      <li class="nav-item">
        <a routerLink="/reports" routerLinkActive="active">
          <i class="ph ph-chart-bar"></i>
          <span>Relatórios</span>
        </a>
      </li>
    </ul>
  </nav>

  <div class="sidebar-footer">
    <ul>
      <li class="nav-item">
        <a href="#">
          <i class="ph ph-gear"></i>
          <span>Configurações</span>
        </a>
      </li>
    </ul>

    <button class="theme-toggle" (click)="toggleTheme()">
      <i class="ph" [ngClass]="isDarkMode ? 'ph-sun' : 'ph-moon'"></i>
      <span>Modo {{ isDarkMode ? 'Claro' : 'Escuro' }}</span>
    </button>

    <button class="collapse-btn">
      <i class="ph ph-caret-double-left"></i>
    </button>
  </div>
</aside>
